<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Registration Form</title>

<style>

/* ---------- BODY ---------- */
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffb300,#ff6f00,#d32f2f);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    transition:0.4s;
}

/* DARK MODE */
body.dark{
    background:linear-gradient(135deg,#1a1a1a,#000000);
    color:white;
}

/* ---------- TITLE ---------- */
h2{
    color:white;
    margin-bottom:15px;
    text-shadow:0 3px 8px rgba(0,0,0,0.4);
}

/* ---------- FORM CARD ---------- */
form{
    background:white;
    padding:30px;
    border-radius:20px;
    width:380px;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

body.dark form{
    background:#222;
}

/* ---------- INPUTS ---------- */
input, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;
    border-radius:8px;
    border:2px solid #ffd54f;
    outline:none;
    transition:0.3s;
}

input:focus, select:focus{
    border-color:#ff6f00;
    box-shadow:0 0 8px #ff9800;
}

/* ---------- PASSWORD BOX ---------- */
.password-box{
    position:relative;
}

.eye{
    position:absolute;
    right:10px;
    top:38px;
    cursor:pointer;
    font-size:18px;
}

/* ---------- BUTTON ---------- */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    font-size:16px;
    color:white;
    cursor:pointer;
    background:linear-gradient(45deg,#ffd700,#ff9800,#ff5722,#d32f2f);
    background-size:300%;
    transition:0.4s;
}

button:hover{
    background-position:right;
    transform:scale(1.05);
}

/* ---------- DARK MODE BUTTON ---------- */
.dark-toggle{
    position:absolute;
    top:20px;
    right:20px;
    background:white;
    border-radius:50%;
    padding:10px;
    cursor:pointer;
    font-size:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

/* ---------- ANIMATION ---------- */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- DARK MODE BUTTON -->
<div class="dark-toggle" onclick="toggleDark()">🌙</div>

<h2>✨ Premium Registration Form</h2>

<form onsubmit="return showMessage()">

<label>Full Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Password</label>
<div class="password-box">
<input type="password" id="password" required>
<span class="eye" onclick="togglePassword()">👁️</span>
</div>

<label>Gender</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>

<label>Course / Interest</label>
<select required>
<option value="">--Select Course--</option>
<option>Web Development</option>
<option>AI / Machine Learning</option>
<option>Data Science</option>
<option>App Development</option>
</select>

<button type="submit">Create Premium Account</button>

</form>

<script>

/* PASSWORD SHOW/HIDE */
function togglePassword(){
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* FORM MESSAGE */
function showMessage(){
    alert("🎉 Registration Successful!");
    return false;
}

</script>

</body>
</html>
