<!DOCTYPE html>
<html>
<head>
<title>Premium Registration Form</title>

<style>
body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9800,#ff5722,#ffd700);
}

.container{
background:white;
padding:25px;
width:380px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#ff6f00;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border:2px solid #ffd54f;
border-radius:8px;
outline:none;
transition:0.3s;
}

input:focus,select:focus{
border-color:#ff9800;
}

.gender{
margin-bottom:12px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff9800,#ffd700);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.error{
color:red;
font-size:13px;
display:none;
}

.success{
text-align:center;
color:green;
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>✨ Registration Form</h2>

<form id="regForm">

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>
<div class="error" id="nameError">Name required</div>

<label>Email</label>
<input type="email" id="email" placeholder="Enter valid email" required>
<div class="error" id="emailError">Valid email required</div>

<label>Password</label>
<input type="password" id="password" placeholder="Minimum 6 characters" required>
<div class="error" id="passError">Password must be 6+ characters</div>

<label>Gender</label>
<div class="gender">
<input type="radio" name="gender" value="Male" required> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
</div>

<label>Course / Interest</label>
<select id="course" required>
<option value="">--Select Course--</option>
<option>Web Development</option>
<option>AI / Machine Learning</option>
<option>Data Science</option>
<option>App Development</option>
</select>
<div class="error" id="courseError">Please select course</div>

<button type="submit">Register Now</button>

<div class="success" id="successMsg">
✅ Form Submitted Successfully!
</div>

</form>
</div>

<script>
document.getElementById("regForm").addEventListener("submit",function(e){

e.preventDefault();

let valid=true;

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();
let course=document.getElementById("course").value;

document.getElementById("nameError").style.display="none";
document.getElementById("emailError").style.display="none";
document.getElementById("passError").style.display="none";
document.getElementById("courseError").style.display="none";

if(name===""){
document.getElementById("nameError").style.display="block";
valid=false;
}

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
if(!email.match(emailPattern)){
document.getElementById("emailError").style.display="block";
valid=false;
}

if(password.length<6){
document.getElementById("passError").style.display="block";
valid=false;
}

if(course===""){
document.getElementById("courseError").style.display="block";
valid=false;
}

if(valid){
document.getElementById("successMsg").style.display="block";
}
});
</script>

</body>
</html>
