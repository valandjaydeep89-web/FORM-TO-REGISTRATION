<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Form</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
transition:0.4s;
}
.container{
background:white;
padding:25px;
border-radius:10px;
width:320px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}
h2{text-align:center;margin-bottom:15px;}
input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}
button{
width:100%;
padding:10px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
font-size:16px;
}
button:hover{background:#0056b3;}
.error{color:red;font-size:13px;}
.toggle{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
}
.password-box{position:relative;}
.dark{
background:#121212;
color:white;
}
.dark .container{
background:#1e1e1e;
}
.dark input{
background:#333;
color:white;
border:1px solid #555;
}
.mode-btn{
margin-bottom:10px;
background:black;
}
.dark .mode-btn{
background:#ffc107;
color:black;
}
</style>
</head>

<body>

<div class="container">

<button class="mode-btn" onclick="toggleMode()">Dark Mode</button>

<h2>Register</h2>

<form id="form">

<input type="text" id="name" placeholder="Full Name" required>
<div id="nameError" class="error"></div>

<input type="email" id="email" placeholder="Email Address" required>
<div id="emailError" class="error"></div>

<div class="password-box">
<input type="password" id="password" placeholder="Password" required>
<span class="toggle" onclick="showPassword()">👁️</span>
</div>
<div id="passError" class="error"></div>

<input type="tel" id="phone" placeholder="Phone Number" required>
<div id="phoneError" class="error"></div>

<button type="submit">Register Now</button>

</form>

</div>

<script>

function toggleMode(){
document.body.classList.toggle("dark");
}

function showPassword(){
let pass=document.getElementById("password");
pass.type=pass.type==="password"?"text":"password";
}

document.getElementById("form").addEventListener("submit",function(e){

let valid=true;

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();
let phone=document.getElementById("phone").value.trim();

document.getElementById("nameError").innerHTML="";
document.getElementById("emailError").innerHTML="";
document.getElementById("passError").innerHTML="";
document.getElementById("phoneError").innerHTML="";

if(name.length<3){
document.getElementById("nameError").innerHTML="Enter valid name";
valid=false;
}

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
if(!email.match(emailPattern)){
document.getElementById("emailError").innerHTML="Invalid email format";
valid=false;
}

if(password.length<6){
document.getElementById("passError").innerHTML="Password must be 6+ characters";
valid=false;
}

if(phone.length!=10 || isNaN(phone)){
document.getElementById("phoneError").innerHTML="Enter valid 10 digit number";
valid=false;
}

if(!valid){
e.preventDefault();
}else{
alert("Registration Successful ✅");
}

});
</script>

</body>
</html>
