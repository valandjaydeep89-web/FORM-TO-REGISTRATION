<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Form</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,Arial}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,blue,green);
transition:.4s;
}

body.dark{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}

.container{
width:360px;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
transition:.4s;
animation:fade .6s ease;
}

body.dark .container{
background:#1e1e1e;
}

@keyframes fade{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

.input-group{
position:relative;
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
font-size:15px;
transition:.3s;
}

input:focus{
border-color:blue;
box-shadow:0 0 8px rgba(0,0,255,.3);
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
color:white;
font-weight:600;
transition:.3s;
}

.submit{
background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.submit:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.reset{
background:linear-gradient(45deg,#ffb347,#ffcc33);
color:black;
}

.reset:hover{
transform:scale(1.05);
}

.darkbtn{
margin-top:15px;
width:100%;
background:linear-gradient(45deg,#232526,#414345);
}

.darkbtn:hover{
transform:scale(1.05);
}

.footer{
text-align:center;
margin-top:12px;
font-size:13px;
opacity:.7;
}
</style>
</head>

<body>

<div class="container">

<h2>✨ Premium Registration</h2>

<form id="form">

<div class="input-group">
<input type="text" placeholder="👤 Full Name" required>
</div>

<div class="input-group">
<input type="email" placeholder="📧 Email Address" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="🔒 Password" required>
<span class="eye" onclick="togglePass()">👁️</span>
</div>

<div class="buttons">
<button type="submit" class="submit">🚀 Submit</button>
<button type="reset" class="reset">♻️ Reset</button>
</div>

</form>

<button class="darkbtn" onclick="darkMode()">🌙 Dark Mode</button>

<div class="footer">Premium UI • Professional Form</div>

</div>

<script>
function togglePass(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

function darkMode(){
document.body.classList.toggle("dark");
}

document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();
alert("✅ Form Submitted Successfully!");
});
</script>

</body>
</html>
