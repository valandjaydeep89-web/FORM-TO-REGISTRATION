<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Registration</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb347,#ffcc33,#ff512f);
background-size:400% 400%;
animation:bg 10s infinite alternate;
transition:.4s;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.card{
width:360px;
padding:35px;
border-radius:18px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(18px);
box-shadow:0 20px 45px rgba(0,0,0,.3);
color:#222;
}

h2{text-align:center;margin-bottom:20px;font-weight:700}

.input{position:relative;margin:22px 0}

.input input{
width:100%;
padding:13px;
border-radius:10px;
border:none;
outline:none;
font-size:15px;
background:rgba(255,255,255,.85);
}

.input input.error{
border:2px solid red;
}

.input small{
color:red;
font-size:12px;
display:none;
}

.input label{
position:absolute;
left:12px;
top:13px;
transition:.3s;
background:white;
padding:0 6px;
color:#666;
}

.input input:focus+label,
.input input:valid+label{
top:-8px;
font-size:12px;
color:#ff512f;
}

.eye{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:30px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
color:white;
}

.submit{
background:linear-gradient(135deg,#ff512f,#ffb347);
box-shadow:0 5px 20px rgba(255,80,47,.5);
}

.submit:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 30px rgba(255,80,47,.7);
}

.reset{
background:linear-gradient(135deg,#636363,#2c2c2c);
}

.reset:hover{transform:scale(1.05)}

.mode{
margin-bottom:12px;
width:100%;
background:linear-gradient(135deg,#222,#000);
}

.success{
text-align:center;
margin-top:15px;
color:limegreen;
font-weight:bold;
display:none;
}

.dark{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.dark .card{
background:rgba(0,0,0,.5);
color:white;
}

.dark input{
background:rgba(0,0,0,.6);
color:white;
}

.dark label{
background:transparent;
color:#ddd;
}

</style>
</head>

<body>

<div class="card">

<button class="mode" onclick="toggleMode()">🌙 Dark Mode</button>

<h2>✨ Premium Registration</h2>

<form id="form" novalidate>

<div class="input">
<input type="text" id="name" placeholder="Enter your full name" required>
<label>Full Name</label>
<small>Name required</small>
</div>

<div class="input">
<input type="email" id="email" placeholder="Enter valid email" required>
<label>Email</label>
<small>Enter valid email</small>
</div>

<div class="input">
<input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
<label>Password</label>
<span class="eye" onclick="togglePassword()">👁️</span>
<small>Password too short</small>
</div>

<div class="input">
<input type="tel" id="phone" placeholder="10 digit phone number" required pattern="[0-9]{10}">
<label>Phone</label>
<small>Enter 10 digit number</small>
</div>

<div class="buttons">
<button type="submit" class="submit">🚀 Register Now</button>
<button type="reset" class="reset">🔄 Reset</button>
</div>

<div class="success" id="success">✅ Form Submitted Successfully!</div>

</form>

</div>

<script>

function toggleMode(){
document.body.classList.toggle("dark");
let btn=document.querySelector(".mode");
btn.innerHTML=document.body.classList.contains("dark")
?"☀️ Light Mode":"🌙 Dark Mode";
}

function togglePassword(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

const form=document.getElementById("form");

form.addEventListener("submit",function(e){
e.preventDefault();

let valid=true;

document.querySelectorAll(".input").forEach(field=>{
let input=field.querySelector("input");
let error=field.querySelector("small");

if(!input.checkValidity()){
input.classList.add("error");
error.style.display="block";
valid=false;
}else{
input.classList.remove("error");
error.style.display="none";
}
});

if(valid){
document.getElementById("success").style.display="block";
form.reset();
}
});

</script>

</body>
</html>
