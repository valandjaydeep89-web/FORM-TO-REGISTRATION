<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Registration</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd700,#ffb300,#ff5722,#b71c1c);
transition:.4s;
}

body.dark{
background:#111;
color:white;
}

h2{
color:white;
margin-bottom:15px;
}

form{
background:white;
padding:25px;
border-radius:18px;
width:340px;
box-shadow:0 15px 35px rgba(0,0,0,.35);
}

body.dark form{
background:#222;
}

label{
font-weight:bold;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0 12px;
border-radius:8px;
border:2px solid #ffb300;
outline:none;
transition:.3s;
}

input:focus,select:focus{
border-color:#ff5722;
box-shadow:0 0 6px #ff9800;
}

.error{
border-color:red !important;
}

.password-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
font-size:16px;
color:white;
cursor:pointer;
background:linear-gradient(45deg,#ffd700,#ff9800,#ff5722,#d32f2f);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.darkbtn{
position:absolute;
top:15px;
right:15px;
border:none;
border-radius:50%;
padding:10px;
cursor:pointer;
font-size:18px;
}

.msg{
margin-top:10px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<button class="darkbtn" onclick="toggleDark()">🌙</button>

<h2>Registration Form</h2>

<form id="form">

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label>Password</label>
<div class="password-box">
<input type="password" id="pass" placeholder="Create password" required>
<span class="eye" onclick="togglePass()">👁</span>
</div>

<label>Gender</label><br>
<input type="radio" name="g" required> Male
<input type="radio" name="g"> Female
<input type="radio" name="g"> Other
<br><br>

<label>Course / Interest</label>
<select id="course" required>
<option value="">Select Course</option>
<option>Web Development</option>
<option>AI / Machine Learning</option>
<option>Data Science</option>
<option>App Development</option>
</select>

<button type="submit">Register Now</button>

<div class="msg" id="msg"></div>

</form>

<script>
function togglePass(){
let p=document.getElementById("pass");
p.type=p.type==="password"?"text":"password";
}

function toggleDark(){
document.body.classList.toggle("dark");
}

document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

let name=document.getElementById("name");
let email=document.getElementById("email");
let pass=document.getElementById("pass");
let course=document.getElementById("course");
let msg=document.getElementById("msg");

let valid=true;

[name,email,pass,course].forEach(i=>{
i.classList.remove("error");
if(i.value.trim()===""){
i.classList.add("error");
valid=false;
}
});

if(valid){
msg.style.color="green";
msg.innerText="Registration Successful ✅";
this.reset();
}else{
msg.style.color="red";
msg.innerText="Please fill all required fields!";
}
});
</script>

</body>
</html>
